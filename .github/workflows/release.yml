name: Release

on:
  push:
    tags:
      - '*'

env:
  # TEA package versions - update these when upgrading
  TCL_VERSION: "9.0.1"
  TCL_TAG: "core-9-0-1"
  TK_TAG: "core-9-0-1"
  TDOM_VERSION: "0.9.6"
  TKTABLE_VERSION: "2.12.1"
  TKTABLE_TAG: "tktable-2-12-1"

jobs:
  #############################################
  # Build platform-specific binaries
  #############################################
  
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake zip
          sudo apt install -y libpq-dev
          sudo apt install -y libx11-dev libxft-dev libxss-dev libxext-dev

      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache Tcl build
        id: cache-tcl
        uses: actions/cache@v4
        with:
          path: tcl-install
          key: tcl-${{ env.TCL_VERSION }}-linux-x86_64

      - name: Build Tcl
        if: steps.cache-tcl.outputs.cache-hit != 'true'
        run: |
          curl -L -o tcl-src.tar.gz https://github.com/tcltk/tcl/archive/refs/tags/${{ env.TCL_TAG }}.tar.gz
          tar xzf tcl-src.tar.gz
          cd tcl-${{ env.TCL_TAG }}/unix
          ./configure --prefix=${{ github.workspace }}/tcl-install
          make -j$(nproc)
          make install

      - name: Cache Tk build
        id: cache-tk
        uses: actions/cache@v4
        with:
          path: tk-install
          key: tk-${{ env.TCL_VERSION }}-linux-x86_64

      - name: Build Tk
        if: steps.cache-tk.outputs.cache-hit != 'true'
        run: |
          curl -L -o tk-src.tar.gz https://github.com/tcltk/tk/archive/refs/tags/${{ env.TK_TAG }}.tar.gz
          tar xzf tk-src.tar.gz
          cd tk-${{ env.TK_TAG }}/unix
          ./configure --prefix=${{ github.workspace }}/tk-install \
            --with-tcl=${{ github.workspace }}/tcl-install/lib
          make -j$(nproc)
          make install

      - name: Build tdom
        run: |
          curl -L -o tdom-src.tgz http://tdom.org/downloads/tdom-${{ env.TDOM_VERSION }}-src.tgz
          tar xzf tdom-src.tgz
          cd tdom-*/
          ./configure --with-tcl=${{ github.workspace }}/tcl-install/lib
          make -j$(nproc)

      - name: Build Tktable
        run: |
          curl -L -o tktable-src.tar.gz https://github.com/bohagan1/TkTable/releases/download/${{ env.TKTABLE_TAG }}/tktable-${{ env.TKTABLE_VERSION }}-src.tar.gz
          tar xzf tktable-src.tar.gz
          cd tktable-*/
          ./configure \
            --with-tcl=${{ github.workspace }}/tcl-install/lib \
            --with-tk=${{ github.workspace }}/tk-install/lib
          make -j$(nproc)

      - name: Build (CMake packages)
        run: |
          cmake -B build \
            -D PROJECT_VERSION=${{ github.ref_name }} \
            -D CMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build build --parallel
          cmake --install build --component vfs

      - name: Assemble TEA packages into vfs
        run: |
          # tdom
          mkdir -p install/lib/tdom/Linux/x86_64
          cp tdom-*/*.so install/lib/tdom/Linux/x86_64/

          # Tktable
          mkdir -p install/lib/Tktable/Linux/x86_64
          cp tktable-*/*.so install/lib/Tktable/Linux/x86_64/
          cp tktable-*/library/tkTable.tcl install/lib/Tktable/

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vfs-linux-x86_64
          path: install/lib/
          retention-days: 1

  build-linux-aarch64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake zip
          sudo apt install -y libpq-dev
          sudo apt install -y libx11-dev libxft-dev libxss-dev libxext-dev

      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout private dependencies
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/dlsh-dependencies
          token: ${{ secrets.DLSH_DEPENDENCIES_TOKEN }}
          path: deps/dlsh-dependencies
        continue-on-error: true

      - name: Cache Tcl build
        id: cache-tcl
        uses: actions/cache@v4
        with:
          path: tcl-install
          key: tcl-${{ env.TCL_VERSION }}-linux-aarch64

      - name: Build Tcl
        if: steps.cache-tcl.outputs.cache-hit != 'true'
        run: |
          curl -L -o tcl-src.tar.gz https://github.com/tcltk/tcl/archive/refs/tags/${{ env.TCL_TAG }}.tar.gz
          tar xzf tcl-src.tar.gz
          cd tcl-${{ env.TCL_TAG }}/unix
          ./configure --prefix=${{ github.workspace }}/tcl-install
          make -j$(nproc)
          make install

      - name: Cache Tk build
        id: cache-tk
        uses: actions/cache@v4
        with:
          path: tk-install
          key: tk-${{ env.TCL_VERSION }}-linux-aarch64

      - name: Build Tk
        if: steps.cache-tk.outputs.cache-hit != 'true'
        run: |
          curl -L -o tk-src.tar.gz https://github.com/tcltk/tk/archive/refs/tags/${{ env.TK_TAG }}.tar.gz
          tar xzf tk-src.tar.gz
          cd tk-${{ env.TK_TAG }}/unix
          ./configure --prefix=${{ github.workspace }}/tk-install \
            --with-tcl=${{ github.workspace }}/tcl-install/lib
          make -j$(nproc)
          make install

      - name: Build tdom
        run: |
          curl -L -o tdom-src.tgz http://tdom.org/downloads/tdom-${{ env.TDOM_VERSION }}-src.tgz
          tar xzf tdom-src.tgz
          cd tdom-*/
          ./configure --with-tcl=${{ github.workspace }}/tcl-install/lib
          make -j$(nproc)

      - name: Build Tktable
        run: |
          curl -L -o tktable-src.tar.gz https://github.com/bohagan1/TkTable/releases/download/${{ env.TKTABLE_TAG }}/tktable-${{ env.TKTABLE_VERSION }}-src.tar.gz
          tar xzf tktable-src.tar.gz
          cd tktable-*/
          ./configure \
            --with-tcl=${{ github.workspace }}/tcl-install/lib \
            --with-tk=${{ github.workspace }}/tk-install/lib
          make -j$(nproc)

      - name: Build (CMake packages)
        run: |
          cmake -B build \
            -D PROJECT_VERSION=${{ github.ref_name }} \
            -D CMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build build --parallel
          cmake --install build --component vfs

      - name: Assemble TEA packages into vfs
        run: |
          # tdom
          mkdir -p install/lib/tdom/Linux/aarch64
          cp tdom-*/*.so install/lib/tdom/Linux/aarch64/

          # Tktable
          mkdir -p install/lib/Tktable/Linux/aarch64
          cp tktable-*/*.so install/lib/Tktable/Linux/aarch64/
          cp tktable-*/library/tkTable.tcl install/lib/Tktable/

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vfs-linux-aarch64
          path: install/lib/
          retention-days: 1

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Install build dependencies
        run: |
          brew update
          brew install cmake libpq postgresql@17

      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout private dependencies
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/dlsh-dependencies
          token: ${{ secrets.DLSH_DEPENDENCIES_TOKEN }}
          path: deps/dlsh-dependencies
        continue-on-error: true

      - name: Cache Tcl build
        id: cache-tcl
        uses: actions/cache@v4
        with:
          path: tcl-install
          key: tcl-${{ env.TCL_VERSION }}-macos-arm64

      - name: Build Tcl
        if: steps.cache-tcl.outputs.cache-hit != 'true'
        run: |
          curl -L -o tcl-src.tar.gz https://github.com/tcltk/tcl/archive/refs/tags/${{ env.TCL_TAG }}.tar.gz
          tar xzf tcl-src.tar.gz
          cd tcl-${{ env.TCL_TAG }}/unix
          ./configure --prefix=${{ github.workspace }}/tcl-install
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Cache Tk build
        id: cache-tk
        uses: actions/cache@v4
        with:
          path: tk-install
          key: tk-${{ env.TCL_VERSION }}-macos-arm64

      - name: Build Tk
        if: steps.cache-tk.outputs.cache-hit != 'true'
        run: |
          curl -L -o tk-src.tar.gz https://github.com/tcltk/tk/archive/refs/tags/${{ env.TK_TAG }}.tar.gz
          tar xzf tk-src.tar.gz
          cd tk-${{ env.TK_TAG }}/unix
          ./configure --prefix=${{ github.workspace }}/tk-install \
            --with-tcl=${{ github.workspace }}/tcl-install/lib \
            --enable-aqua
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build tdom
        run: |
          curl -L -o tdom-src.tgz http://tdom.org/downloads/tdom-${{ env.TDOM_VERSION }}-src.tgz
          tar xzf tdom-src.tgz
          cd tdom-*/
          ./configure --with-tcl=${{ github.workspace }}/tcl-install/lib
          make -j$(sysctl -n hw.ncpu)

      - name: Build Tktable
        run: |
          curl -L -o tktable-src.tar.gz https://github.com/bohagan1/TkTable/releases/download/${{ env.TKTABLE_TAG }}/tktable-${{ env.TKTABLE_VERSION }}-src.tar.gz
          tar xzf tktable-src.tar.gz
          cd tktable-*/
          ./configure \
            --with-tcl=${{ github.workspace }}/tcl-install/lib \
            --with-tk=${{ github.workspace }}/tk-install/lib
          make -j$(sysctl -n hw.ncpu)

      - name: Set up keychain for code signing
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_APP_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$APP_CERTIFICATE_BASE64" ]; then
            APP_CERTIFICATE_PATH=$RUNNER_TEMP/developerID_application.p12
            echo -n "$APP_CERTIFICATE_BASE64" | base64 --decode -o $APP_CERTIFICATE_PATH

            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security import $APP_CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
          fi

      - name: Build and sign (CMake packages)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$TEAM_ID" ]; then
            cmake -B build -G Xcode \
              -D CMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM="$TEAM_ID" \
              -D PROJECT_VERSION=${{ github.ref_name }} \
              -D CMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
            cmake --build build --config Release
          else
            cmake -B build \
              -D PROJECT_VERSION=${{ github.ref_name }} \
              -D CMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
            cmake --build build --parallel
          fi
          cmake --install build --component vfs

      - name: Assemble TEA packages into vfs
        run: |
          # tdom
          mkdir -p install/lib/tdom/Darwin/arm64
          cp tdom-*/*.dylib install/lib/tdom/Darwin/arm64/

          # Tktable
          mkdir -p install/lib/Tktable/Darwin/arm64
          cp tktable-*/*.dylib install/lib/Tktable/Darwin/arm64/
          cp tktable-*/library/tkTable.tcl install/lib/Tktable/

      - name: Sign assembled TEA package dylibs
        env:
          APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_APP_CERTIFICATE_BASE64 }}
        run: |
          # The CMake packages are signed by the Xcode build, but the TEA
          # packages (tdom, Tktable) are built with configure/make and copied
          # in unsigned. Sign them with the same Developer ID + hardened runtime
          # + secure timestamp so dlsh.zip is fully notarization-ready (required
          # now that consumers like stim2 bundle dlsh.zip into a notarized app).
          if [ -z "$APP_CERTIFICATE_BASE64" ]; then
            echo "No signing certificate; skipping (unsigned TEA dylibs)."
            exit 0
          fi
          codesign --force --timestamp --options=runtime \
            --sign "Developer ID Application" \
            install/lib/tdom/Darwin/arm64/*.dylib \
            install/lib/Tktable/Darwin/arm64/*.dylib
          # Fail loudly if any did not end up Developer-ID signed.
          for f in install/lib/tdom/Darwin/arm64/*.dylib install/lib/Tktable/Darwin/arm64/*.dylib; do
            codesign -dvvv "$f" 2>&1 | grep -q "Authority=Developer ID Application" \
              || { echo "FAIL: $f not Developer-ID signed"; exit 1; }
          done

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vfs-darwin-arm64
          path: install/lib/
          retention-days: 1

  #############################################
  # Assemble final dlsh.zip from all platforms
  #############################################
  
  assemble-release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code (for vfs base)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble combined vfs
        run: |
          # Start with the base vfs from the repo (pure Tcl packages + pkgIndex files)
          mkdir -p final/lib
          if [ -d vfs/lib ]; then
            cp -r vfs/lib/* final/lib/
          fi

          # Merge in platform-specific builds
          # Each artifact has the lib/ structure with platform subdirs populated
          
          echo "Merging Linux x86_64..."
          cp -rn artifacts/vfs-linux-x86_64/* final/lib/ 2>/dev/null || cp -r artifacts/vfs-linux-x86_64/* final/lib/
          
          echo "Merging Linux aarch64..."
          cp -rn artifacts/vfs-linux-aarch64/* final/lib/ 2>/dev/null || cp -r artifacts/vfs-linux-aarch64/* final/lib/
          
          echo "Merging Darwin arm64..."
          cp -rn artifacts/vfs-darwin-arm64/* final/lib/ 2>/dev/null || cp -r artifacts/vfs-darwin-arm64/* final/lib/

          # Show what we've got
          echo "Final vfs structure (shared libs):"
          find final/lib -name "*.so" -o -name "*.dylib" | head -50

      - name: Create dlsh.zip
        run: |
          cd final
          zip -r ../dlsh-${{ github.ref_name }}.zip lib/

      - name: Upload dlsh.zip for downstream packaging
        uses: actions/upload-artifact@v4
        with:
          name: dlsh-zip
          path: dlsh-${{ github.ref_name }}.zip

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dlsh-${{ github.ref_name }}.zip"
          body: |
            dlsh version ${{ github.ref_name }}

            Combined package with support for:
            - macOS arm64
            - Linux x86_64
            - Linux aarch64
          generateReleaseNotes: true
          allowUpdates: true

  # Build, sign, and notarize the standalone dlsh INTERPRETER installer (.pkg):
  #   /usr/local/bin/dlsh + /usr/local/dlsh/{dlsh.zip,dlsh-runtime.zip}
  # Sidecar mode (no trailing data) so the binary codesigns; uses the final
  # dlsh.zip assembled above. Mirrors the keychain/notarytool steps already
  # proven by the library-installer workflow.
  package-macos-interp:
    needs: assemble-release
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install cmake libpq postgresql@17

      - name: Download the assembled dlsh.zip
        uses: actions/download-artifact@v4
        with:
          name: dlsh-zip
          path: dist/

      - name: Set up keychain for code signing
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_APP_CERTIFICATE_BASE64 }}
          INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
        run: |
          APP_CERTIFICATE_PATH=$RUNNER_TEMP/developerID_application.p12
          echo -n "$APP_CERTIFICATE_BASE64" | base64 --decode -o $APP_CERTIFICATE_PATH
          INSTALLER_CERTIFICATE_PATH=$RUNNER_TEMP/developerID_installer.p12
          echo -n "$INSTALLER_CERTIFICATE_BASE64" | base64 --decode -o $INSTALLER_CERTIFICATE_PATH
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$INSTALLER_CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build the interpreter (signable sidecar) + harden the signature
        run: |
          cmake -B build -D DLSH_BUILD_INTERP=ON -D DLSH_APPEND_ZIP=OFF
          cmake --build build --target dlsh_interp -j"$(sysctl -n hw.ncpu)"
          # The POST_BUILD step only ad-hoc signs; re-sign with Developer ID +
          # hardened runtime + secure timestamp (required for notarization).
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" build/dlsh
          codesign --verify --strict --verbose=2 build/dlsh

      - name: Build, sign, and notarize the .pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          INSTALLER_CERT_ID: ${{ secrets.APPLE_INSTALLLER_CERT_ID }}
        run: |
          ZIP=$(ls dist/dlsh-*.zip | head -1)
          macos/build-dlsh-pkg.sh build/dlsh "$ZIP" "${{ github.ref_name }}" \
            "$INSTALLER_CERT_ID" build/dlsh-runtime.zip
          # Distinguish from the library installer; pick the signed pkg.
          SRC=$(ls dlsh-${{ github.ref_name }}-*-signed.pkg | head -1)
          PKG="dlsh-interp-${{ github.ref_name }}-$(uname -m)-signed.pkg"
          mv "$SRC" "$PKG"
          xcrun notarytool store-credentials --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" --password "$APPLE_APP_PASSWORD" "dlsh-signing"
          xcrun notarytool submit "$PKG" --keychain-profile "dlsh-signing" --wait
          xcrun stapler staple "$PKG"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Attach the interpreter installer to the release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ env.PKG }}
          tag: ${{ github.ref_name }}
          allowUpdates: true
          omitBodyDuringUpdate: true

  # Build the standalone dlsh INTERPRETER installer (.deb) for Linux, both
  # arches. No signing needed, so the single-file (append) build is used:
  #   /usr/local/bin/dlsh + /usr/local/dlsh/dlsh.zip
  # ubuntu-22.04[-arm] matches the glibc baseline of the release dlsh.zip.
  package-linux-interp:
    needs: assemble-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,     arch: x86_64 }
          - { os: ubuntu-22.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git autoconf pkg-config zip \
            zlib1g-dev libpq-dev \
            libx11-dev libxft-dev libxss-dev libxext-dev libxrender-dev \
            libfontconfig1-dev

      - name: Download the assembled dlsh.zip
        uses: actions/download-artifact@v4
        with:
          name: dlsh-zip
          path: dist/

      - name: Build the interpreter (single-file)
        run: |
          cmake -B build -D DLSH_BUILD_INTERP=ON
          cmake --build build --target dlsh_interp -j"$(nproc)"

      - name: Build the .deb
        run: |
          ZIP=$(ls dist/dlsh-*.zip | head -1)
          linux/build-dlsh-deb.sh build/dlsh "$ZIP" "${{ github.ref_name }}"

      - name: Attach the .deb to the release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dlsh-interp_*.deb"
          tag: ${{ github.ref_name }}
          allowUpdates: true
          omitBodyDuringUpdate: true